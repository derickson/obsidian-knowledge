services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./vaults:/app/vaults
      - ./backend/app:/app/app
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped
