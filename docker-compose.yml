services:
  obsidian-headless:
    build:
      context: .
      dockerfile: obsidian-headless/Dockerfile
    user: "1000:1000"
    ports:
      - "3104:3104"
    volumes:
      - ./vaults:/app/vaults
      - /home/dave/.config/obsidian-headless:/home/dave/.config/obsidian-headless
      - ./vaults/AgentKnowledge:/home/dave/dev/obsidian-knowledge/vaults/AgentKnowledge
    env_file:
      - .env
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3104"]
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3105:3105"
    volumes:
      - ./backend/app:/app/backend/app
    env_file:
      - .env
    environment:
      - HEADLESS_URL=http://obsidian-headless:3104
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3105", "--app-dir", "backend"]
    depends_on:
      - obsidian-headless
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8104:8104"
    environment:
      - PORT=8104
      - BACKEND_URL=http://backend:3105
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped
